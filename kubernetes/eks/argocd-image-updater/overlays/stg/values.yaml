config:
  logLevel: "info"
  registries:
    - name: ECR
      api_url: https://374146079343.dkr.ecr.ap-northeast-1.amazonaws.com
      prefix: 374146079343.dkr.ecr.ap-northeast-1.amazonaws.com
      insecure: false
      credentials: ext:/scripts/ecr-login.sh
  git:
    writeBranch: main
    commitMessageTemplate: "chore: update image tag to {{ .NewTag }}"
    authorName: "Argo CD Image Updater"
    authorEmail: "noreply@example.com"
    addSignature: false
argocd:
  config:
    enabled: true
rbac:
  create: true
serviceAccount:
  create: false
  name: argocd-image-updater-sa
authScripts:
  enabled: true
  scripts:
    ecr-login.sh: |
      #!/bin/sh
      aws ecr --region "ap-northeast-1" get-authorization-token --output text --query 'authorizationData[].authorizationToken' | base64 -d
