apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  source:
    repoURL: git@github.com:cloud-pratica/cloud-pratica-backend
    path: ops/kubernetes/eks/prometheus/overlays/stg
    targetRevision: develop
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
