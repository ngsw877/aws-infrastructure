apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: log-transfer
  namespace: argocd
spec:
  source:
    repoURL: git@github.com:ngsw877/aws-infrastructure.git
    path: kubernetes/eks/log-transfer/overlays/stg
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
