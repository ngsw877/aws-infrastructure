apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  source:
    repoURL: git@github.com:ngsw877/aws-infrastructure.git
    path: kubernetes/eks/external-secrets/overlays/stg
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
